<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#2a1f14"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Recetas"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Recetas Fáciles</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #faf7f2; color: #1c1410; min-height: 100vh; }

    header { background: #2a1f14; padding: 32px 20px 28px; }
    .inner { max-width: 700px; margin: 0 auto; }
    header h1 { color: #fdf6ec; font-size: clamp(22px, 5vw, 32px); font-weight: 700; margin-bottom: 6px; }
    header p { color: #a8917a; font-size: 14px; margin-bottom: 20px; }

    .search-row { display: flex; gap: 8px; }
    .search-box { flex: 1; display: flex; align-items: center; background: #fdf6ec; border-radius: 12px; border: 2px solid transparent; padding: 0 14px; transition: border-color .2s; }
    .search-box:focus-within { border-color: #d4a96a; }
    .search-box input { flex: 1; background: transparent; border: none; font-size: 16px; color: #1c1410; padding: 13px 0; font-family: inherit; outline: none; }
    .btn-search { background: #d4a96a; border: none; border-radius: 12px; padding: 0 20px; color: #2a1f14; font-weight: 700; font-size: 15px; cursor: pointer; min-height: 48px; white-space: nowrap; }
    .btn-search:disabled { opacity: .4; cursor: default; }

    .chips { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .chip { background: rgba(255,255,255,.08); border: 1px solid rgba(212,169,106,.35); border-radius: 20px; padding: 5px 13px; color: #d4a96a; font-size: 13px; cursor: pointer; font-family: inherit; }
    .chip:hover { background: rgba(212,169,106,.15); }

    main { max-width: 700px; margin: 0 auto; padding: 28px 20px 60px; }

    .estado { text-align: center; padding: 60px 20px; }
    .estado .icono { font-size: 50px; margin-bottom: 14px; }
    .estado h2 { font-size: 20px; color: #3d2f22; margin-bottom: 8px; font-weight: 600; }
    .estado p { font-size: 14px; color: #8b7355; line-height: 1.6; }
    .spinner { width: 36px; height: 36px; border: 3px solid #e8e2d9; border-top-color: #d4a96a; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }

    .lista { display: flex; flex-direction: column; gap: 14px; }
    .tarjeta { background: #fff; border-radius: 14px; overflow: hidden; cursor: pointer; border: 1.5px solid #e8e2d9; display: flex; gap: 0; transition: box-shadow .2s, border-color .2s; }
    .tarjeta:hover, .tarjeta:focus { box-shadow: 0 6px 24px rgba(0,0,0,.1); border-color: #d4a96a; outline: none; }
    .tarjeta img { width: 110px; height: 110px; object-fit: cover; flex-shrink: 0; }
    .tarjeta-info { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
    .tarjeta-info h3 { font-size: 16px; font-weight: 700; color: #1c1410; line-height: 1.3; }
    .tarjeta-info .meta { font-size: 12px; color: #b5a090; }
    .tarjeta-info .ver { font-size: 13px; color: #d4a96a; font-weight: 600; margin-top: 4px; }

    /* Modal */
    .fondo-modal { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: flex; align-items: flex-end; justify-content: center; padding: 0; animation: fadeIn .2s; }
    @media (min-width: 600px) { .fondo-modal { align-items: center; padding: 20px; } }
    .modal { background: #fff; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; border-radius: 20px 20px 0 0; }
    @media (min-width: 600px) { .modal { border-radius: 20px; } }
    .modal-foto { position: relative; height: 220px; background: #e8e2d9; }
    .modal-foto img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-foto::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 50%); }
    .modal-titulo { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px; z-index: 1; }
    .modal-titulo h2 { color: #fff; font-size: 20px; font-weight: 700; line-height: 1.25; margin-bottom: 4px; }
    .modal-titulo .badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { background: rgba(255,255,255,.2); color: #fff; font-size: 11px; padding: 2px 10px; border-radius: 20px; }
    .btn-cerrar { position: absolute; top: 12px; right: 12px; z-index: 2; background: rgba(255,255,255,.9); border: none; border-radius: 50%; width: 34px; height: 34px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal-cuerpo { padding: 20px; }
    .seccion-titulo { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #8b7355; margin-bottom: 12px; }
    .ing-lista { list-style: none; margin-bottom: 24px; }
    .ing-lista li { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f0ece5; font-size: 14px; color: #3d2f22; line-height: 1.5; }
    .ing-lista li::before { content: "✓"; width: 18px; height: 18px; border-radius: 50%; background: #d4a96a; color: #2a1f14; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .pasos-lista { list-style: none; }
    .paso { display: flex; gap: 12px; margin-bottom: 14px; }
    .paso-num { min-width: 30px; height: 30px; border-radius: 50%; background: #2a1f14; color: #d4a96a; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .paso-texto { background: #faf7f2; border-radius: 10px; padding: 10px 14px; flex: 1; font-size: 14px; color: #3d2f22; line-height: 1.65; border: 1px solid #f0ece5; }
    .yt-btn { display: flex; align-items: center; gap: 8px; background: #fff0f0; border: 1.5px solid #ffc0c0; border-radius: 10px; padding: 12px 16px; color: #c0392b; font-weight: 600; font-size: 14px; text-decoration: none; margin-top: 16px; }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    button:focus-visible, input:focus-visible { outline: 3px solid #d4a96a; outline-offset: 2px; }
  </style>
</head>
<body>

<header>
  <div class="inner">
    <h1>🍳 Recetas Fáciles</h1>
    <p>Buscá por ingrediente o nombre del plato</p>
    <div class="search-row">
      <div class="search-box">
        <input id="inp" type="search" placeholder="pollo, pasta, chocolate..." aria-label="Buscar recetas" autocomplete="off" enterkeyhint="search"/>
      </div>
      <button class="btn-search" id="btnBuscar" disabled>Buscar</button>
    </div>
    <div class="chips">
      <button class="chip" data-q="chicken">🍗 Pollo</button>
      <button class="chip" data-q="pasta">🍝 Pasta</button>
      <button class="chip" data-q="beef">🥩 Carne</button>
      <button class="chip" data-q="salmon">🐟 Salmón</button>
      <button class="chip" data-q="egg">🥚 Huevos</button>
      <button class="chip" data-q="chocolate">🍫 Chocolate</button>
      <button class="chip" data-q="rice">🍚 Arroz</button>
      <button class="chip" data-q="vegetarian">🥗 Vegetariano</button>
    </div>
  </div>
</header>

<main id="main">
  <div class="estado">
    <div class="icono">🥘</div>
    <h2>¿Qué querés cocinar hoy?</h2>
    <p>Escribí un ingrediente arriba o elegí una sugerencia para empezar.</p>
  </div>
</main>

<!-- Modal -->
<div id="modal" style="display:none" role="dialog" aria-modal="true"></div>

<script>
var API = "https://www.themealdb.com/api/json/v1/1";

// Traducciones básicas de categorías y zonas
var CATS = {
  "Beef":"Carne","Chicken":"Pollo","Dessert":"Postre","Lamb":"Cordero",
  "Miscellaneous":"Varios","Pasta":"Pasta","Pork":"Cerdo","Seafood":"Mariscos",
  "Side":"Guarnición","Starter":"Entrada","Vegan":"Vegano","Vegetarian":"Vegetariano",
  "Breakfast":"Desayuno","Goat":"Cabrito"
};
var AREAS = {
  "American":"Americana","British":"Británica","Canadian":"Canadiense",
  "Chinese":"China","Croatian":"Croata","Dutch":"Holandesa","Egyptian":"Egipcia",
  "French":"Francesa","Greek":"Griega","Indian":"India","Irish":"Irlandesa",
  "Italian":"Italiana","Jamaican":"Jamaiquina","Japanese":"Japonesa","Kenyan":"Keniana",
  "Malaysian":"Malaya","Mexican":"Mexicana","Moroccan":"Marroquí","Polish":"Polaca",
  "Portuguese":"Portuguesa","Russian":"Rusa","Spanish":"Española","Thai":"Tailandesa",
  "Tunisian":"Tunecina","Turkish":"Turca","Vietnamese":"Vietnamita","Unknown":"Desconocida"
};

function tCat(s) { return CATS[s] || s; }
function tArea(s) { return AREAS[s] || s; }

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Cache
function gc(k) { try { var d=JSON.parse(localStorage.getItem("r_"+k)); return d&&d.t>Date.now()-21600000?d.v:null; } catch(e){return null;} }
function sc(k,v) { try { localStorage.setItem("r_"+k,JSON.stringify({t:Date.now(),v:v})); } catch(e){} }

var inp       = document.getElementById("inp");
var btnBuscar = document.getElementById("btnBuscar");
var mainEl    = document.getElementById("main");
var modalEl   = document.getElementById("modal");
var recetas   = [];
var query     = "";

inp.addEventListener("input", function() { btnBuscar.disabled = !inp.value.trim(); });
inp.addEventListener("keydown", function(e) { if (e.key==="Enter") buscar(); });
btnBuscar.addEventListener("click", buscar);

document.querySelectorAll(".chip").forEach(function(c) {
  c.addEventListener("click", function() { inp.value=c.dataset.q; btnBuscar.disabled=false; buscar(); });
});

async function buscar() {
  var q = inp.value.trim();
  if (!q) return;
  query = q;
  btnBuscar.disabled = true;
  btnBuscar.textContent = "Buscando...";
  mainEl.innerHTML = '<div class="estado"><div class="spinner"></div><p style="color:#8b7355">Buscando <strong>'+esc(q)+'</strong>...</p></div>';

  var cached = gc(q);
  if (cached) { recetas=cached; mostrarResultados(); btnBuscar.disabled=false; btnBuscar.textContent="Buscar"; return; }

  try {
    var res = await fetch(API+"/search.php?s="+encodeURIComponent(q));
    var data = await res.json();
    recetas = data.meals || [];
    sc(q, recetas);
    mostrarResultados();
  } catch(e) {
    mainEl.innerHTML = '<div class="estado"><div class="icono">😕</div><h2>Sin conexión</h2><p>Revisá tu conexión e intentá de nuevo.</p></div>';
  }
  btnBuscar.disabled = false;
  btnBuscar.textContent = "Buscar";
}

function mostrarResultados() {
  if (!recetas.length) {
    mainEl.innerHTML = '<div class="estado"><div class="icono">🔍</div><h2>Sin resultados</h2><p>No encontramos recetas para "'+esc(query)+'". Probá con otro término.</p></div>';
    return;
  }
  var html = '<p style="font-size:14px;color:#8b7355;margin-bottom:16px"><strong style="color:#3d2f22">'+recetas.length+' recetas</strong> encontradas — tocá una para ver los detalles</p><div class="lista">';
  recetas.forEach(function(r, i) {
    html +=
      '<article class="tarjeta" tabindex="0" role="button" aria-label="Ver receta: '+esc(r.strMeal)+'" data-i="'+i+'">' +
        '<img src="'+esc(r.strMealThumb)+'/preview" alt="'+esc(r.strMeal)+'" loading="lazy" onerror="this.style.display=\'none\'"/>' +
        '<div class="tarjeta-info">' +
          '<h3>'+esc(r.strMeal)+'</h3>' +
          '<div class="meta">'+
            (r.strCategory?'📂 '+tCat(r.strCategory):'') +
            (r.strArea?' &nbsp;·&nbsp; 🌍 '+tArea(r.strArea):'') +
          '</div>' +
          '<div class="ver">Ver receta →</div>' +
        '</div>' +
      '</article>';
  });
  html += '</div>';
  mainEl.innerHTML = html;
  mainEl.querySelectorAll(".tarjeta").forEach(function(el) {
    el.addEventListener("click", function() { abrirModal(recetas[+el.dataset.i]); });
    el.addEventListener("keydown", function(e) { if (e.key==="Enter"||e.key===" ") abrirModal(recetas[+el.dataset.i]); });
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────
async function abrirModal(r) {
  modalEl.style.display = "flex";
  document.body.style.overflow = "hidden";

  // Si no tiene instrucciones completas, buscamos el detalle
  if (!r.strInstructions) {
    try {
      var res = await fetch(API+"/lookup.php?i="+r.idMeal);
      var data = await res.json();
      if (data.meals) r = data.meals[0];
    } catch(e) {}
  }

  var ings = [];
  for (var i=1;i<=20;i++) {
    var ing=r["strIngredient"+i], med=r["strMeasure"+i];
    if (ing&&ing.trim()) ings.push((med?med.trim()+" ":"")+ing.trim());
  }

  var pasos = [];
  if (r.strInstructions) {
    pasos = r.strInstructions.split(/\r?\n/).map(function(s){return s.trim();}).filter(function(s){return s.length>10;});
  }

  var html =
    '<div class="fondo-modal" id="fondo">'+
    '<div class="modal">'+
      '<div class="modal-foto">'+
        '<img src="'+esc(r.strMealThumb)+'" alt="'+esc(r.strMeal)+'" loading="lazy"/>'+
        '<div class="modal-titulo">'+
          '<h2>'+esc(r.strMeal)+'</h2>'+
          '<div class="badges">'+
            (r.strCategory?'<span class="badge">'+tCat(r.strCategory)+'</span>':'')+
            (r.strArea?'<span class="badge">'+tArea(r.strArea)+'</span>':'')+
          '</div>'+
        '</div>'+
        '<button class="btn-cerrar" id="btnCerrar" aria-label="Cerrar">✕</button>'+
      '</div>'+
      '<div class="modal-cuerpo">'+
        '<p class="seccion-titulo">🧂 Ingredientes</p>'+
        '<ul class="ing-lista">'+
          ings.map(function(ing){return '<li>'+esc(ing)+'</li>';}).join("")+
        '</ul>'+
        (pasos.length?
          '<p class="seccion-titulo">📋 Preparación</p>'+
          '<ol class="pasos-lista">'+
            pasos.map(function(p,i){return '<li class="paso"><div class="paso-num">'+(i+1)+'</div><div class="paso-texto">'+esc(p)+'</div></li>';}).join("")+
          '</ol>':
          '<p style="color:#8b7355;font-size:14px">Instrucciones no disponibles en texto.</p>'
        )+
        (r.strYoutube?'<a href="'+esc(r.strYoutube)+'" target="_blank" rel="noopener" class="yt-btn">▶ Ver en YouTube</a>':'')+
      '</div>'+
    '</div>'+
    '</div>';

  modalEl.innerHTML = html;

  document.getElementById("btnCerrar").addEventListener("click", cerrarModal);
  document.getElementById("fondo").addEventListener("click", function(e) { if (e.target===this) cerrarModal(); });
  document.getElementById("btnCerrar").focus();
}

function cerrarModal() {
  modalEl.style.display = "none";
  modalEl.innerHTML = "";
  document.body.style.overflow = "";
}

document.addEventListener("keydown", function(e) { if (e.key==="Escape") cerrarModal(); });

// Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function(){});
}
</script>
</body>
</html>
